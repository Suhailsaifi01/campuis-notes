<!DOCTYPE html>
<html lang="en" class="dark-theme theme-transition">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - College Notes Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid">
        <!-- Sidebar - Consistent with Dashboard -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-graduation-cap"></i>
                <h5 class="mt-2 mb-0">Notes Hub</h5>
            </div>
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-chart-line nav-icon"></i>
                <span>Dashboard</span>
            </a>
            <a href="dashboard.html#upload" class="nav-item active">
                <i class="fas fa-upload nav-icon"></i>
                <span>Upload</span>
            </a>
            <a href="Notes.html" class="nav-item">
                <i class="fas fa-book nav-icon"></i>
                <span>All Notes</span>
            </a>
            <a href="dashboard.html#top" class="nav-item">
                <i class="fas fa-star nav-icon"></i>
                <span>Top Notes</span>
            </a>
            <a href="Share.html" class="nav-item">
                <i class="fas fa-share-alt nav-icon"></i>
                <span>Share</span>
            </a>
            <a href="Profile.html" class="nav-item">
                <i class="fas fa-user nav-icon"></i>
                <span>Profile</span>
            </a>
            <a href="setting.html" class="nav-item">
                <i class="fas fa-cog nav-icon"></i>
                <span>Settings</span>
            </a>
        </nav>

        <!-- Top Navbar - Consistent -->
        <header class="top-nav">
            <div class="d-flex align-items-center">
                <div class="nav-profile"></div>
                <div class="hamburger" onclick="toggleSidebar()">
                    <span></span><span></span><span></span>
                </div>
                <input type="text" class="search-global ms-3" id="notesSearch" placeholder="🔍 Search all notes..." oninput="searchNotes(this.value)">
                <div class="status-dot" id="statusDot"></div>
            </div>
            <div class="nav-icons">
                <button class="nav-btn" onclick="location.href='dashboard.html'" title="Dashboard">
                    <i class="fas fa-chart-line"></i>
                </button>
                <button class="nav-btn active" onclick="scrollToUpload()" title="Upload">
                    <i class="fas fa-plus"></i>
                </button>
                <div class="notifications-dropdown">
                    <button class="nav-btn" onclick="toggleNotifications()">
                        <i class="fas fa-bell"></i>
                    </button>
                    <div class="notif-list" id="notifList"></div>
                </div>
                <button class="nav-btn" onclick="toggleTheme()" title="Theme">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Hero -->
            <section class="hero-section mb-5 fade-in-up">
                <h1 class="hero-title"><i class="fas fa-book-open me-3"></i>Your Notes Library</h1>
                <p class="hero-subtitle mb-4">Manage, organize, and access your academic notes with ease</p>
            </section>

            <!-- Upload Section -->
            <section id="upload-section" class="upload-section mb-6">
                <div class="card glass-card">
                    <div class="card-header">
                        <h3 class="mb-0"><i class="fas fa-cloud-upload-alt me-2"></i>Upload New Note</h3>
                    </div>
                    <div class="card-body">
                        <form id="uploadForm">
                            <div class="row g-3">
                                <div class="col-lg-3 col-md-6">
                                    <label class="form-label">Title</label>
                                    <input type="text" class="form-control" id="noteTitle" placeholder="e.g. Algorithms Notes" required>
                                </div>
                                <div class="col-lg-3 col-md-6">
                                    <label class="form-label">Subject</label>
                                    <input type="text" class="form-control" id="noteSubject" placeholder="e.g. DSA" required>
                                </div>
                                <div class="col-lg-3 col-md-6">
                                    <label class="form-label">Semester</label>
                                    <input type="text" class="form-control" id="noteSemester" placeholder="e.g. 3">
                                </div>
                                <div class="col-lg-3 col-md-6">
                                    <label class="form-label">PDF File</label>
                                    <input type="file" class="form-control" id="noteFile" accept=".pdf" required>
                                </div>
                            </div>
                            <div class="mt-4 d-flex gap-3">
                                <button type="submit" class="btn btn-primary btn-lg px-4">
                                    <i class="fas fa-cloud-upload-alt me-2"></i>Upload Note
                                </button>
                                <button type="button" class="btn btn-outline-secondary btn-lg px-4" onclick="exportAllNotes()">
                                    <i class="fas fa-download me-2"></i>Export All
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>

            <!-- Notes Grid -->
            <section class="notes-section">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="mb-0"><i class="fas fa-list me-2"></i>All Notes</h2>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-primary btn-sm" onclick="loadNotes('notesGrid')">
                            <i class="fas fa-sync me-1"></i>Refresh
                        </button>
                        <button class="btn btn-success btn-sm" onclick="importNotes()">
                            <i class="fas fa-file-import me-1"></i>Import JSON
                        </button>
                    </div>
                </div>
                <div class="card glass-card">
                    <div class="notes-grid" id="notesGrid">
                        <!-- Dynamic notes -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
    <script>
        // Page-specific
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('noteTitle').value.trim();
            const subject = document.getElementById('noteSubject').value.trim();
            const semester = document.getElementById('noteSemester').value.trim();
            const file = document.getElementById('noteFile').files[0];
            
            const success = await uploadNote(title, subject, file);
            if (success) {
                e.target.reset();
                showToast('Note uploaded successfully!');
                loadNotes('notesGrid');
            }
        });

        function scrollToUpload() {
            document.querySelector('#upload-section').scrollIntoView({ behavior: 'smooth' });
        }

        function exportAllNotes() {
            exportAll();
        }

        function importNotes() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        const notes = JSON.parse(ev.target.result);
                        notes.forEach(addNoteToDB);
                        loadNotes('notesGrid');
                        showToast(`${notes.length} notes imported!`);
                    } catch {
                        showToast('Invalid file', 'error');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // Load on start
        window.addEventListener('load', () => loadNotes('notesGrid'));
    </script>
</body>
</html>
