<!DOCTYPE html>
<html lang="en" class="dark-theme theme-transition">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Notes - College Notes Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid">
        <nav class="sidebar" id="sidebar">
            <div class="p-3">
                <i class="fas fa-graduation-cap fa-2x mb-4" style="color: var(--gradient);"></i>
            </div>
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-chart-line nav-icon"></i>
                <span>Dashboard</span>
            </a>
            <a href="dashboard.html#home" class="nav-item">
                <i class="fas fa-home nav-icon"></i>
                <span>Home</span>
            </a>
            <a href="Profile.html" class="nav-item">
                <i class="fas fa-user nav-icon"></i>
                <span>Profile</span>
            </a>
            <a href="Notes.html" class="nav-item">
                <i class="fas fa-book nav-icon"></i>
                <span>Notes</span>
            </a>
            <a href="Share.html" class="nav-item active">
                <i class="fas fa-share-alt nav-icon"></i>
                <span>Share</span>
            </a>
            <a href="setting.html" class="nav-item">
                <i class="fas fa-cog nav-icon"></i>
                <span>Settings</span>
            </a>
        </nav>

        <header class="top-nav">
            <div class="d-flex align-items-center">
                <div class="nav-profile"></div>
                <div class="hamburger" onclick="toggleSidebar()">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <input type="text" class="search-global ms-3" placeholder="Search shareable notes...">
                <div class="status-dot" id="statusDot"></div>
            </div>
            <div class="nav-icons">
                <button class="nav-btn" onclick="window.location.href='dashboard.html'" title="Dashboard">
                    <i class="fas fa-chart-line"></i>
                </button>
                <button class="nav-btn" onclick="uploadNote()" title="Upload">
                    <i class="fas fa-plus"></i>
                </button>
                <div class="notifications-dropdown">
                    <button class="nav-btn" onclick="toggleNotifications()">
                        <i class="fas fa-bell"></i>
                    </button>
                    <div class="notif-list" id="notifList"></div>
                </div>
                <button class="nav-btn" onclick="toggleTheme()" title="Toggle Theme">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
            </div>
        </header>

        <main class="main-content">
            <div class="row">
                <div class="col-lg-8">
                    <div class="card glass-card mb-4">
                        <div class="card-header">
                            <h3><i class="fas fa-share-alt me-2"></i>My Share Links</h3>
                        </div>
                        <div class="card-body">
                            <div class="share-link-card mb-4" data-id="1">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6>Algorithms Notes - Sem 3</h6>
                                        <small class="text-muted">Shared with 8 classmates | 124 views | Expires in 30 days</small>
                                    </div>
                                    <div class="btn-group" role="group">
                                        <button class="btn btn-sm btn-outline-primary copy-link-btn" onclick="copyLink(this)">
                                            <i class="fas fa-copy"></i>
                                        </button>
                                        <button class="btn btn-sm btn-outline-danger" onclick="deleteLink(this)">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="share-url mt-3 p-3 bg-black rounded" id="link1">
                                    http://notes-hub.com/share/abc123
                                </div>
                            </div>
                            <!-- More share links -->
                        </div>
                        <div class="card-footer text-center">
                            <button class="btn btn-primary" onclick="createNewShare()">
                                <i class="fas fa-plus me-2"></i>Create New Share Link
                            </button>
                        </div>
                    </div>

                    <div class="card glass-card">
                        <div class="card-header">
                            <h3><i class="fas fa-users me-2"></i>Shared with Me</h3>
                        </div>
                        <div class="card-body">
                            <p class="text-muted mb-3">No notes shared with you yet.</p>
                            <div class="text-center">
                                <button class="btn btn-outline-light" onclick="discoverPublicNotes()">
                                    Discover Public Notes
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="card glass-card sticky-top" style="top: 80px;">
                        <div class="card-header">
                            <h5><i class="fas fa-broadcast-tower me-2"></i>Share Options</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-4">
                                <h6>Access Type</h6>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="access" id="public" checked>
                                    <label class="form-check-label" for="public">Public (Anyone)</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="access" id="private">
                                    <label class="form-check-label" for="private">Private (Link only)</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="access" id="classmates">
                                    <label class="form-check-label" for="classmates">Classmates only</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <h6>Expiry</h6>
                                <select class="form-select">
                                    <option>Never</option>
                                    <option>7 days</option>
                                    <option>30 days</option>
                                    <option>90 days</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <h6>Password Protection</h6>
                                <div class="input-group">
                                    <input type="password" class="form-control" placeholder="Set password">
                                    <button class="btn btn-outline-secondary" type="button">Generate</button>
                                </div>
                            </div>
                            <button class="btn btn-success w-100">
                                <i class="fas fa-magic me-2"></i>Advanced Options
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <canvas id="particles-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="db.js"></script>
    <script src="app-new.js"></script>
    <script>
        // Share functionality
        function copyLink(btn) {
            const url = btn.parentElement.parentElement.querySelector('.share-url').textContent;
            navigator.clipboard.writeText(url);
            btn.innerHTML = '<i class="fas fa-check"></i>';
            setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i>', 2000);
        }

        function deleteLink(btn) {
            if(confirm('Delete this share link?')) {
                btn.closest('.share-link-card').remove();
            }
        }

        function createNewShare() {
            // Modal or form
            alert('Select note to share');
        }
    </script>
</body>
</html>
