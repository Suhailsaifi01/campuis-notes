<!DOCTYPE html>
<html lang="en" class="dark-theme theme-transition">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - College Notes Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid">
        <nav class="sidebar" id="sidebar">
            <div class="p-3">
                <i class="fas fa-graduation-cap fa-2x mb-4" style="color: var(--gradient);"></i>
            </div>
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-chart-line nav-icon"></i>
                <span>Dashboard</span>
            </a>
            <a href="Home.html" class="nav-item">
                <i class="fas fa-home nav-icon"></i>
                <span>Home</span>
            </a>
            <a href="Profile.html" class="nav-item">
                <i class="fas fa-user nav-icon"></i>
                <span>Profile</span>
            </a>
            <a href="Notes.html" class="nav-item">
                <i class="fas fa-book nav-icon"></i>
                <span>Notes</span>
            </a>
            <a href="Share.html" class="nav-item">
                <i class="fas fa-share-alt nav-icon"></i>
                <span>Share</span>
            </a>
            <a href="setting.html" class="nav-item active">
                <i class="fas fa-cog nav-icon"></i>
                <span>Settings</span>
            </a>
        </nav>

        <header class="top-nav">
            <div class="d-flex align-items-center">
                <div class="nav-profile"></div>
                <div class="hamburger" onclick="toggleSidebar()">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <input type="text" class="search-global ms-3" placeholder="Quick search...">
                <div class="status-dot" id="statusDot"></div>
            </div>
            <div class="nav-icons">
                <button class="nav-btn" onclick="window.location.href='Home.html'" title="Dashboard">
                    <i class="fas fa-chart-line"></i>
                </button>
                <button class="nav-btn" onclick="uploadNote()" title="Upload">
                    <i class="fas fa-plus"></i>
                </button>
                <div class="notifications-dropdown">
                    <button class="nav-btn" onclick="toggleNotifications()">
                        <i class="fas fa-bell"></i>
                    </button>
                    <div class="notif-list" id="notifList"></div>
                </div>
                <button class="nav-btn active" onclick="toggleTheme()" title="Toggle Theme">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
            </div>
        </header>

        <main class="main-content">
            <div class="row">
                <div class="col-lg-8">
                    <div class="card glass-card mb-4">
                        <div class="card-header">
                            <h3><i class="fas fa-user-cog me-2"></i>Account Settings</h3>
                        </div>
                        <div class="card-body">
                            <form>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Full Name</label>
                                        <input type="text" class="form-control" placeholder="Your name" value="John Doe">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Email</label>
                                        <input type="email" class="form-control" placeholder="your.email@example.com" value="john@example.com">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Bio</label>
                                    <textarea class="form-control" rows="3" placeholder="Tell us about yourself...">Computer Science Student | 3rd Year</textarea>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">College</label>
                                        <select class="form-select">
                                            <option>MIT</option>
                                            <option>Stanford</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Semester</label>
                                        <select class="form-select">
                                            <option>Semester 3</option>
                                            <option>Semester 5</option>
                                        </select>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-save me-2"></i>Save Changes
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="card glass-card">
                        <div class="card-header">
                            <h3><i class="fas fa-shield-alt me-2"></i>Privacy & Security</h3>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-check mb-3">
                                        <input class="form-check-input" type="checkbox" id="publicProfile">
                                        <label class="form-check-label" for="publicProfile">
                                            Public Profile
                                        </label>
                                    </div>
                                    <div class="form-check mb-3">
                                        <input class="form-check-input" type="checkbox" id="shareNotifications" checked>
                                        <label class="form-check-label" for="shareNotifications">
                                            Share Notifications
                                        </label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-check mb-3">
                                        <input class="form-check-input" type="checkbox" id="autoBackup">
                                        <label class="form-check-label" for="autoBackup">
                                            Auto Backup (Cloud)
                                        </label>
                                    </div>
                                    <div class="form-check mb-3">
                                        <input class="form-check-input" type="checkbox" id="darkMode" checked>
                                        <label class="form-check-label" for="darkMode">
                                            Dark Mode (Default)
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <button class="btn btn-success mt-3">
                                <i class="fas fa-lock me-2"></i>Update Security
                            </button>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <!-- Storage Usage -->
                    <div class="card glass-card mb-4">
                        <div class="card-header">
                            <h5><i class="fas fa-hdd me-2"></i>Storage</h5>
                        </div>
                        <div class="card-body text-center">
                            <div class="storage-bar mb-3">
                                <div class="storage-fill" style="width: 65%"></div>
                            </div>
                            <div class="d-flex justify-content-between small">
                                <span>12.4 / 50 MB</span>
                                <span>25%</span>
                            </div>
                            <button class="btn btn-sm btn-outline-warning w-100 mt-3">
                                Upgrade Storage
                            </button>
                        </div>
                    </div>

                    <!-- App Version -->
                    <div class="card glass-card mb-4">
                        <div class="card-header">
                            <h5><i class="fas fa-info-circle me-2"></i>About</h5>
                        </div>
                        <div class="card-body text-center">
                            <div class="app-logo mb-3">
                                <i class="fas fa-graduation-cap fa-3x" style="color: var(--gradient);"></i>
                            </div>
                            <h6>College Notes Hub</h6>
                            <p class="small mb-2">Version 2.1.3</p>
                            <p class="text-muted small mb-0">Made with ❤️ for students</p>
                            <hr>
                            <div class="mt-3">
                                <a href="#" class="btn btn-sm btn-outline-light w-100">
                                    Check for Updates
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- Connected Apps -->
                    <div class="card glass-card">
                        <div class="card-header">
                            <h5><i class="fas fa-plug me-2"></i>Connected Apps</h5>
                        </div>
                        <div class="card-body">
                            <div class="connected-app mb-3">
                                <div class="d-flex align-items-center">
                                    <div class="app-icon bg-google me-3">G</div>
                                    <div>
                                        <strong>Google Drive</strong>
                                        <div class="small text-muted">Last sync: 2 hours ago</div>
                                    </div>
                                </div>
                            </div>
                            <div class="connected-app">
                                <div class="d-flex align-items-center">
                                    <div class="app-icon bg-dropbox me-3">D</div>
                                    <div>
                                        <strong>Dropbox</strong>
                                        <div class="small text-muted">Connected</div>
                                    </div>
                                </div>
                            </div>
                            <a href="#" class="btn btn-sm btn-outline-primary mt-3 w-100">
                                Connect New Service
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <canvas id="particles-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="db.js"></script>
    <script src="app-new.js"></script>
</body>
</html>
